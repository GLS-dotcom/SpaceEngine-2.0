name: Apply Phase0 Skeleton - smoke test

permissions:
  contents: write
  pull-requests: write

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Create/checkout branch
        run: |
          BRANCH="feature/phase0-init"
          if git ls-remote --exit-code --heads origin "$BRANCH"; then
            git fetch origin "$BRANCH":"$BRANCH"
            git checkout "$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

      - name: Write a small test file
        run: |
          echo "phase0 smoke test" > PHASE0_TEST.txt
          git add PHASE0_TEST.txt
          git commit -m "Add PHASE0_TEST.txt (smoke test)" || echo "no changes"
          git push --set-upstream origin HEAD || echo "push failed"

      - name: Create pull request (if not exists)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          HEAD_BRANCH="$(git rev-parse --abbrev-ref HEAD)"
          BASE="main"
          TITLE="Phase0 smoke test"
          BODY="Smoke test to validate Actions workflow."
          EXISTING=$(curl -s -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/pulls?head=${REPO%/*}:$HEAD_BRANCH&state=open")
          if [ "$(echo "$EXISTING" | jq 'length')" -gt 0 ]; then
            echo "PR already exists for $HEAD_BRANCH"
          else
            curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/pulls" \
              -d "{\"title\":\"$TITLE\",\"head\":\"$HEAD_BRANCH\",\"base\":\"$BASE\",\"body\":\"$BODY\"}" \
              && echo "PR created"
          fi
